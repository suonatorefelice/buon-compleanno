<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buon compleanno Andrea! 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Coriandoli di sfondo -->
  <canvas id="confetti"></canvas>

  <main class="scene">
    <!-- Fase 1: torta + invito -->
    <div id="stage-cake" class="stage">
      <!-- parole della canzone SOPRA la torta -->
      <div class="top-area">
        <div id="lyrics" class="lyrics" aria-live="polite">
          <div class="lyric-line" data-i="0">Tanti auguri a te</div>
          <div class="lyric-line" data-i="1">Tanti auguri a te</div>
          <div class="lyric-line" data-i="2">Tanti auguri ad Andrea</div>
          <div class="lyric-line" data-i="3">Tanti auguri a te</div>
        </div>
        <p id="blow-cue" class="blow-cue">Soffia!</p>
      </div>

      <!-- Torta (illustrazione SVG) -->
      <button id="cake" class="cake" aria-label="Spegni le candeline">
        <svg class="cake-svg" viewBox="0 0 260 244" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="oxBody" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#5a0c15"/><stop offset=".5" stop-color="#b8202f"/><stop offset="1" stop-color="#5a0c15"/>
            </linearGradient>
            <radialGradient id="oxTop" cx=".42" cy=".3" r=".8">
              <stop offset="0" stop-color="#e05046"/><stop offset=".55" stop-color="#8c1420"/><stop offset="1" stop-color="#5a0c15"/>
            </radialGradient>
            <linearGradient id="emBody" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#0a5c3f"/><stop offset=".5" stop-color="#2fd699"/><stop offset="1" stop-color="#0a5c3f"/>
            </linearGradient>
            <radialGradient id="emTop" cx=".42" cy=".3" r=".8">
              <stop offset="0" stop-color="#66e8b6"/><stop offset=".55" stop-color="#0f8a5f"/><stop offset="1" stop-color="#0a5c3f"/>
            </radialGradient>
            <radialGradient id="flG" cx=".5" cy=".72" r=".85">
              <stop offset="0" stop-color="#fff6d0"/><stop offset=".4" stop-color="#ffd166"/><stop offset=".75" stop-color="#ff8c00"/><stop offset="1" stop-color="#ff5a00"/>
            </radialGradient>
            <radialGradient id="glow" cx=".5" cy=".5" r=".5">
              <stop offset="0" stop-color="#ffd98a" stop-opacity=".75"/>
              <stop offset="40%" stop-color="#ff9a2e" stop-opacity=".25"/>
              <stop offset="100%" stop-color="#ff8c00" stop-opacity="0"/>
            </radialGradient>
          </defs>

          <!-- piatto flat (la torta ci appoggia sopra) -->
          <g class="build b-plate">
          <rect x="38" y="202" width="184" height="14" rx="7" fill="#c9cdd8"/>
          <rect x="38" y="202" width="184" height="6" rx="3" fill="#eceef4"/>
          </g>

          <!-- ===== piano inferiore (sangue di bue) ===== -->
          <g class="build b-bottom">
          <path d="M52,150 L208,150 L208,196 Q208,208 196,208 L64,208 Q52,208 52,196 Z" fill="url(#oxBody)"/>
          <!-- fetta di pan di spagna -->
          <rect x="52" y="182" width="156" height="9" fill="#e9c79a"/>
          <rect x="52" y="182" width="156" height="3" fill="#f3dcb4"/>
          <!-- glassa superiore + colate -->
          <path d="M52,150 v6 q6,2 8,-1 q4,14 9,1 q5,15 10,1 q5,16 11,1 q5,14 10,1 q6,17 12,1 q5,14 10,1 q6,16 12,1 q5,15 11,1 q5,14 10,1 q6,15 11,1 q5,15 10,1 q6,3 8,-1 v-13 Z" fill="#b8202f"/>
          <ellipse cx="130" cy="150" rx="78" ry="15" fill="url(#oxTop)"/>
          <ellipse cx="104" cy="146" rx="34" ry="6" fill="#fff" opacity=".16"/>
          </g>

          <!-- ===== piano superiore (smeraldo) ===== -->
          <g class="build b-top">
          <path d="M86,102 L174,102 L174,146 Q174,156 164,156 L96,156 Q86,156 86,146 Z" fill="url(#emBody)"/>
          <rect x="86" y="132" width="88" height="8" fill="#e9c79a"/>
          <rect x="86" y="132" width="88" height="3" fill="#f3dcb4"/>
          <path d="M86,102 v5 q5,2 7,-1 q4,13 9,1 q5,14 10,1 q5,15 11,1 q5,13 10,1 q6,15 11,1 q5,13 10,1 q5,3 7,-1 v-11 Z" fill="#2fd699"/>
          <ellipse cx="130" cy="102" rx="44" ry="9" fill="url(#emTop)"/>
          <ellipse cx="112" cy="99" rx="18" ry="4" fill="#fff" opacity=".2"/>
          </g>

          <!-- ===== candeline ===== -->
          <g class="b-candles">
          <g class="candle">
            <rect x="106" y="70" width="8" height="30" rx="3" fill="#8c1420"/>
            <rect x="108" y="70" width="2.5" height="30" fill="#fff" opacity=".5"/>
            <g class="flame">
              <ellipse cx="110" cy="59" rx="19" ry="21" fill="url(#glow)"/>
              <path d="M110,50 C104,56 104,66 110,68 C116,66 116,56 110,50 Z" fill="url(#flG)"/>
            </g>
          </g>
          <g class="candle tall">
            <rect x="126" y="60" width="8" height="40" rx="3" fill="#0f8a5f"/>
            <rect x="128" y="60" width="2.5" height="40" fill="#fff" opacity=".5"/>
            <g class="flame">
              <ellipse cx="130" cy="49" rx="20" ry="22" fill="url(#glow)"/>
              <path d="M130,39 C123,46 123,57 130,59 C137,57 137,46 130,39 Z" fill="url(#flG)"/>
            </g>
          </g>
          <g class="candle">
            <rect x="146" y="70" width="8" height="30" rx="3" fill="#8c1420"/>
            <rect x="148" y="70" width="2.5" height="30" fill="#fff" opacity=".5"/>
            <g class="flame">
              <ellipse cx="150" cy="59" rx="19" ry="21" fill="url(#glow)"/>
              <path d="M150,50 C144,56 144,66 150,68 C156,66 156,56 150,50 Z" fill="url(#flG)"/>
            </g>
          </g>
          </g>
        </svg>
      </button>

      <p id="prompt" class="prompt">🎵 Tocca la torta per iniziare</p>

      <audio id="song" src="song.mp3" preload="auto"></audio>
      <audio id="applause" src="applause.mp3" preload="auto"></audio>
      <div id="mic-status" class="mic-status"></div>
    </div>

    <!-- Fase 2: messaggio di auguri -->
    <div id="stage-message" class="stage hidden">
      <h1 class="wish">Tanti auguri di<br />buon compleanno<br /><span class="name">Andrea</span></h1>
      <p class="wish-sub">Ti auguro di realizzare tutte<br />le cose belle che hai espresso<br />quest'anno!</p>
      <p class="wish-note">(scusa se ti ho fatto soffiare come uno scemo sul telefono ihihih)</p>
      <button id="replay" class="replay">↺ Riaccendi</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
